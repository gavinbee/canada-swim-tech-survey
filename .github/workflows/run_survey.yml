name: run_survey

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month

permissions:
  contents: write   # needed to create releases
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed for Pages OIDC authentication

jobs:
  survey:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run survey
        run: python main.py

      # Pages requires an index.html at the root
      - name: Prepare Pages artifact
        run: cp output/report.html output/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="survey-$(date -u +'%Y-%m-%d-%H%M')"
          gh release create "$TAG" \
            --title "Survey $(date -u +'%B %-d, %Y')" \
            --notes-file output/RUN_INFO.md \
            "data/results.csv#Club software dataset (CSV)"

  notify:
    runs-on: ubuntu-latest
    needs: survey
    if: always()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: gavin.bee@gmail.com
          from: Canada Swim Survey <${{ secrets.MAIL_USERNAME }}>
          subject: >
            [${{ needs.survey.result == 'success' && 'PASS' || 'FAIL' }}]
            Canada Swim Survey — ${{ github.run_id }}
          body: |
            Workflow run ${{ github.run_id }} completed with status: ${{ needs.survey.result }}

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ${{ needs.survey.result == 'success' && format('Report: https://{0}.github.io/canada-swim-tech-survey/', github.repository_owner) || '' }}
